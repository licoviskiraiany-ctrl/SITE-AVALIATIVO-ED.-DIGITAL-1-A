<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desigualdade Social: Uma Realidade Urgente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header role="banner">
        <nav aria-label="Menu Principal">
            <div class="logo">Consciência Social</div>
            <div class="accessibility-controls">
                <button id="btn-contrast" aria-label="Alternar Alto Contraste">🌓</button>
                <button id="btn-font-increase" aria-label="Aumentar Fonte">A+</button>
                <button id="btn-font-decrease" aria-label="Diminuir Fonte">A-</button>
            </div>
        </nav>
    </header>

    <main id="main-content">
        <section class="hero" aria-labelledby="hero-title">
            <h1 id="hero-title">Entendendo a Desigualdade Social</h1>
            <p>Um olhar profundo sobre as disparidades que moldam nosso mundo.</p>
        </section>

        <section id="data-section" class="container" aria-labelledby="stats-title">
            <h2 id="stats-title">Estatísticas e Impactos</h2>
            <div id="cards-container" class="grid-layout">
                </div>
        </section>

        <section class="container" aria-labelledby="faq-title">
            <h2 id="faq-title">Causas e Consequências</h2>
            <div id="accordion-container">
                </div>
        </section>

        <section class="carousel-section" aria-label="Galeria de Imagens e Fatos">
            <div class="carousel">
                <div id="carousel-track" class="carousel-track">
                    </div>
                <button class="carousel-btn prev" aria-label="Slide Anterior">❮</button>
                <button class="carousel-btn next" aria-label="Próximo Slide">❯</button>
            </div>
        </section>
    </main>

    <footer role="contentinfo">
        <p>&copy; 2023 Landing Page Social. Focada em Acessibilidade.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
